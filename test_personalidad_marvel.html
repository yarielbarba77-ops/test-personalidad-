<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Personalidad Marvel</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8212A;
    --gold: #F5C518;
    --blue: #1B4FD8;
    --navy: #0D1B4B;
    --white: #FAFAFA;
    --bg: #0a0e1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 15%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    background: linear-gradient(145deg, #111827, #1a2540);
    border-radius: 24px;
    max-width: 560px;
    width: 100%;
    padding: 2.5rem 2rem;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(135deg, #E8212A, #F5C518, #1B4FD8, #E8212A);
    background-size: 300% 300%;
    border-radius: 26px;
    z-index: -1;
    animation: borderSpin 4s linear infinite;
  }

  @keyframes borderSpin {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* INTRO */
  #intro { text-align: center; }

  .marvel-logo {
    font-family: 'Bangers', cursive;
    font-size: 56px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #E8212A, #F5C518);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.1rem;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .hero-icons-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .hero-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .intro-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }

  .btn-start {
    background: linear-gradient(135deg, #E8212A, #b8181f);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 16px 52px;
    font-family: 'Bangers', cursive;
    font-size: 24px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(232,33,42,0.5);
  }

  .btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 36px rgba(232,33,42,0.7);
  }

  /* QUIZ */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #E8212A, #F5C518);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .progress-label {
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
    min-width: 36px;
    text-align: right;
  }

  .question-badge {
    display: inline-block;
    background: rgba(245,197,24,0.12);
    color: var(--gold);
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .question-text {
    font-family: 'Bangers', cursive;
    font-size: 30px;
    color: white;
    letter-spacing: 1px;
    line-height: 1.2;
    margin-bottom: 1.5rem;
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.75rem; }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 18px;
    text-align: left;
    color: rgba(255,255,255,0.8);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-letter {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    font-size: 16px;
    color: rgba(255,255,255,0.45);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn:hover {
    background: rgba(245,197,24,0.07);
    border-color: rgba(245,197,24,0.35);
    transform: translateX(5px);
    color: white;
  }

  .option-btn:hover .option-letter {
    background: rgba(245,197,24,0.2);
    color: var(--gold);
  }

  .option-btn.selected {
    background: rgba(232,33,42,0.13);
    border-color: var(--red);
    color: white;
  }

  .option-btn.selected .option-letter {
    background: var(--red);
    color: white;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .btn-nav {
    flex: 1;
    padding: 13px 20px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-back {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55);
  }

  .btn-back:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  .btn-next {
    background: linear-gradient(135deg, #1B4FD8, #1038a8);
    color: white;
    box-shadow: 0 4px 16px rgba(27,79,216,0.4);
  }

  .btn-next:hover:not(:disabled) {
    transform: scale(1.02);
    box-shadow: 0 6px 28px rgba(27,79,216,0.6);
  }

  .btn-nav:disabled { opacity: 0.28; cursor: default; }

  /* RESULT */
  #result { text-align: center; }

  .result-confetti {
    font-size: 36px;
    margin-bottom: 0.5rem;
    animation: bounce 0.7s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  .result-hero-icon {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    border: 3px solid;
    animation: iconPop 0.6s cubic-bezier(.175,.885,.32,1.275);
  }

  @keyframes iconPop {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  .result-label {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 0.2rem;
  }

  .result-name {
    font-family: 'Bangers', cursive;
    font-size: 46px;
    letter-spacing: 3px;
    margin-bottom: 0.75rem;
  }

  .result-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .traits-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .trait-pill {
    padding: 6px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    border: 1.5px solid;
  }

  .answers-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .answers-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 0.75rem;
  }

  .answer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
  }

  .answer-row:last-child { border-bottom: none; }

  .answer-q {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    flex: 1;
  }

  .answer-a {
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
    text-align: right;
  }

  .btn-restart {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.13);
    color: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: 13px 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-restart:hover {
    background: rgba(255,255,255,0.09);
    color: white;
  }
</style>
</head>
<body>
<div class="card">

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="marvel-logo">MARVEL</div>
    <div class="subtitle">Test de Personalidad</div>
    <div class="hero-icons-row">
      <div class="hero-chip">🕷️ Spider-Man</div>
      <div class="hero-chip">🛡️ Cap. América</div>
      <div class="hero-chip">⚡ Thor</div>
      <div class="hero-chip">🐾 Black Panther</div>
      <div class="hero-chip">🐜 Ant-Man</div>
    </div>
    <p class="intro-desc">Responde 10 preguntas sobre tus gustos y preferencias para descubrir qué superhéroe de Marvel llevas dentro.</p>
    <button class="btn-start" onclick="startTest()">¡COMENZAR!</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">1/10</div>
    </div>
    <div class="question-badge" id="q-badge">Pregunta 1</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn-nav btn-back" id="btn-back" onclick="goBack()" disabled>← Atrás</button>
      <button class="btn-nav btn-next" id="btn-next" onclick="goNext()" disabled>Siguiente →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="result-confetti">🎉</div>
    <div class="result-hero-icon" id="res-icon"></div>
    <div class="result-label">Eres</div>
    <div class="result-name" id="res-name"></div>
    <p class="result-desc" id="res-desc"></p>
    <div class="traits-row" id="res-traits"></div>
    <div class="answers-section">
      <div class="answers-title">Tus respuestas</div>
      <div id="answers-list"></div>
    </div>
    <button class="btn-restart" onclick="restartTest()">↺ Hacer el test de nuevo</button>
  </div>

</div>

<script>
const questions = [
  { text: "¿Qué color te gusta más?", options: ["Rojo", "Azul", "Negro"] },
  { text: "¿Qué te gusta más hacer?", options: ["Manejar un carro", "Caminar", "Volar"] },
  { text: "¿Cuál es tu fruta favorita?", options: ["Plátano", "Fresa", "Kiwi"] },
  { text: "¿Cuál es tu comida favorita?", options: ["Tacos", "Pizza", "Tortas"] },
  { text: "¿Qué prefieres usar?", options: ["Una gorra", "Una bufanda", "Unas gafas"] },
  { text: "¿Qué arma prefieres?", options: ["Cuchillo", "Katana", "Pistola"] },
  { text: "¿Qué tipo de cabello prefieres?", options: ["Cabello largo", "Cabello corto", "Cabello medio"] },
  { text: "¿Qué red social prefieres?", options: ["TikTok", "Instagram", "Facebook"] },
  { text: "¿Qué materia prefieres?", options: ["Español", "Ciencias", "Química"] },
  { text: "¿A qué prefieres jugar?", options: ["Luchitas", "Las atrapadas", "Las escondidas"] }
];

const heroes = [
  {
    name: "Spider-Man", icon: "🕷️",
    color: "#E8212A", colorLight: "rgba(232,33,42,0.18)",
    desc: "Eres ágil, inteligente y siempre dispuesto a ayudar. Tienes un gran sentido del humor y te adaptas a cualquier situación. Tu mayor poder viene de tu corazón y tu ingenio.",
    traits: ["Ágil", "Inteligente", "Curioso", "Valiente"],
    traitColor: "#ff6b6b", traitBg: "rgba(232,33,42,0.15)",
    nameGrad: "linear-gradient(135deg,#E8212A,#ff6b6b)",
    scores: [0, 2, 0, 0, 0, 0, 1, 0, 1, 0]
  },
  {
    name: "Capitán América", icon: "🛡️",
    color: "#1B4FD8", colorLight: "rgba(27,79,216,0.18)",
    desc: "Eres leal, honesto y defiendes siempre lo que es justo. Tienes un fuerte sentido del deber y lideras con el ejemplo. Tu mayor arma es tu carácter inquebrantable.",
    traits: ["Leal", "Honesto", "Líder", "Justo"],
    traitColor: "#6ba3e8", traitBg: "rgba(27,79,216,0.15)",
    nameGrad: "linear-gradient(135deg,#1B4FD8,#6ba3e8)",
    scores: [1, 0, 1, 2, 1, 0, 1, 2, 0, 2]
  },
  {
    name: "Thor", icon: "⚡",
    color: "#F5C518", colorLight: "rgba(245,197,24,0.18)",
    desc: "Eres poderoso, apasionado y lleno de energía. Te gusta enfrentar los desafíos de frente y nunca te rindes. Tienes una personalidad magnética que atrae a todos.",
    traits: ["Poderoso", "Apasionado", "Audaz", "Carismático"],
    traitColor: "#e6b800", traitBg: "rgba(245,197,24,0.15)",
    nameGrad: "linear-gradient(135deg,#F5C518,#ffe06b)",
    scores: [0, 2, 0, 1, 2, 2, 0, 0, 0, 0]
  },
  {
    name: "Black Panther", icon: "🐾",
    color: "#9b72cf", colorLight: "rgba(155,114,207,0.18)",
    desc: "Eres estratégico, elegante y muy inteligente. Piensas antes de actuar y siempre tienes un plan. Combinas fuerza con sabiduría de manera única.",
    traits: ["Estratégico", "Elegante", "Sabio", "Fuerte"],
    traitColor: "#c4a4e8", traitBg: "rgba(155,114,207,0.15)",
    nameGrad: "linear-gradient(135deg,#9b72cf,#c4a4e8)",
    scores: [2, 0, 2, 0, 2, 1, 2, 1, 1, 1]
  },
  {
    name: "Ant-Man", icon: "🐜",
    color: "#20b35a", colorLight: "rgba(32,179,90,0.18)",
    desc: "Eres creativo, divertido y lleno de sorpresas. Encuentras soluciones donde otros no las ven. Tu sentido del humor es una de tus mejores armas.",
    traits: ["Creativo", "Divertido", "Ingenioso", "Adaptable"],
    traitColor: "#4ad889", traitBg: "rgba(32,179,90,0.15)",
    nameGrad: "linear-gradient(135deg,#20b35a,#4ad889)",
    scores: [0, 1, 2, 2, 0, 0, 0, 0, 2, 2]
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() { show('quiz'); renderQuestion(); }

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-badge').textContent = `Pregunta ${current + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-label').textContent = `${current + 1}/10`;
  document.getElementById('progress-fill').style.width = `${(current / 10) * 100}%`;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  ['A','B','C'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-letter">${lbl}</span>${q.options[i]}`;
    btn.onclick = () => selectOption(i);
    opts.appendChild(btn);
  });

  document.getElementById('btn-back').disabled = current === 0;
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-next').textContent = current === 9 ? 'Ver resultado ✨' : 'Siguiente →';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (current === 9) { showResult(); return; }
  current++;
  renderQuestion();
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function showResult() {
  const scores = heroes.map(h => answers.reduce((s, a, qi) => s + (a !== null && h.scores[qi] === a ? 1 : 0), 0));
  const h = heroes[scores.indexOf(Math.max(...scores))];

  const icon = document.getElementById('res-icon');
  icon.textContent = h.icon;
  icon.style.borderColor = h.color;
  icon.style.background = h.colorLight;

  const nameEl = document.getElementById('res-name');
  nameEl.textContent = h.name;
  nameEl.style.background = h.nameGrad;
  nameEl.style.webkitBackgroundClip = 'text';
  nameEl.style.webkitTextFillColor = 'transparent';
  nameEl.style.backgroundClip = 'text';

  document.getElementById('res-desc').textContent = h.desc;
  document.getElementById('res-traits').innerHTML = h.traits.map(t =>
    `<span class="trait-pill" style="color:${h.traitColor};background:${h.traitBg};border-color:${h.color}">${t}</span>`
  ).join('');

  document.getElementById('answers-list').innerHTML = questions.map((q, i) =>
    `<div class="answer-row">
      <span class="answer-q">${q.text}</span>
      <span class="answer-a">${answers[i] !== null ? q.options[answers[i]] : '—'}</span>
    </div>`
  ).join('');

  document.getElementById('progress-fill').style.width = '100%';
  show('result');
}

function restartTest() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  show('quiz');
  renderQuestion();
}
</script>
</body>
</html>
